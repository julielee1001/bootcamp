<!DOCTYPE html>
<html>
	<head>
        <script src = "https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"> </script>
		<style>
		    .move{
		        height: 50px;
		        width: 15%;
		        border:solid 1px black;
		        background-color:gray;
		        margin:5px;
		        position:relative;
		        color:white;
		    }
		    #container
		    {
		        display:flex;
		    }
		</style>
	</head>

	<body>
        <div id = container>
            <div class = move id = div1></div>
            <div class = move id = div2></div>
            <div class = move id = div3></div>
            <div class = move id = div4></div>
            <div class = move id = div5></div>
            <div class = move id = div6></div>
            <div class = move id = div7></div>
            <div class = move id = div8></div>
        </div>
        <script>
        // steps and tips:
        // div should move to bottom of screen (do this by using top)
        // next div starts going down once first div starts going back up
        // 1. create a function divWave
        // 2. select and animate div1 
        // 3. set top to HEIGHT
        // 4. nest the next div into current with callback funct
        // 5. repeat for all 8 divs
        // 6. setInterval while using the funct
        
            //This will grab the height of the window of the browser
            var HEIGHT = $(window).height();
            
            function divWave(){
                $("#div1").animate({top: HEIGHT}, "slow", function(){
                    $("#div1").animate({top: 0}, "slow");
                    $("#div2").animate({top: HEIGHT}, "slow", function(){
                        $("#div2").animate({top: 0}, "slow");
                        $("#div3").animate({top: HEIGHT}, "slow", function(){
                            $("#div3").animate({top: 0}, "slow");
                            $("#div4").animate({top: HEIGHT}, "slow", function(){
                                $("#div4").animate({top: 0}, "slow");
                                $("#div5").animate({top: HEIGHT}, "slow", function(){
                                    $("#div5").animate({top: 0}, "slow");
                                    $("#div6").animate({top: HEIGHT}, "slow", function(){
                                        $("#div6").animate({top: 0}, "slow");
                                        $("#div7").animate({top: HEIGHT}, "slow", function(){
                                            $("#div7").animate({top: 0}, "slow");
                                            $("#div8").animate({top: HEIGHT}, "slow");
                                            $("#div8").animate({top: 0}, "slow");
                                        })
                                    })
                                })
                            })
                            
                        })
                    })
                })
            }
            setInterval(divWave, 5300);
            
        </script>
	</body>
</html>
